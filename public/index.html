<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake Food Battle Server</title>
    <style>

        margin: 0;
        min-height: 100vh;
        display: grid;

        background: #111;

      }

      main {
        width: min(680px, calc(100vw - 32px));

        color: #7dd3fc;

    </main>
